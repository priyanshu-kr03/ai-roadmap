<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Engineer Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --text: #f1f5f9;
    --muted: #64748b;
    --subtle: #334155;

    --green: #22c55e; --green-bg: rgba(34,197,94,0.1); --green-border: rgba(34,197,94,0.25);
    --teal: #14b8a6; --teal-bg: rgba(20,184,166,0.1); --teal-border: rgba(20,184,166,0.25);
    --blue: #60a5fa; --blue-bg: rgba(96,165,250,0.1); --blue-border: rgba(96,165,250,0.25);
    --violet: #a78bfa; --violet-bg: rgba(167,139,250,0.1); --violet-border: rgba(167,139,250,0.25);
    --coral: #fb923c; --coral-bg: rgba(251,146,60,0.1); --coral-border: rgba(251,146,60,0.25);
    --pink: #f472b6; --pink-bg: rgba(244,114,182,0.1); --pink-border: rgba(244,114,182,0.25);
    --amber: #fbbf24; --amber-bg: rgba(251,191,36,0.1); --amber-border: rgba(251,191,36,0.25);
    --slate: #94a3b8; --slate-bg: rgba(148,163,184,0.1); --slate-border: rgba(148,163,184,0.25);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .page-wrap { max-width: 780px; margin: 0 auto; }

  /* Header */
  .page-header { text-align: center; margin-bottom: 40px; }
  .header-eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); background: var(--surface); border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 99px; margin-bottom: 16px;
  }
  .header-eyebrow span { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  .page-header h1 { font-size: 32px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 8px; }
  .page-header p { font-size: 14px; color: var(--muted); }

  /* Stats row */
  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 28px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 18px;
  }
  .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 500; color: var(--text); }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.06em; }

  /* Progress */
  .prog-wrap { margin-bottom: 36px; }
  .prog-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .prog-meta span { font-size: 13px; color: var(--muted); }
  .prog-meta strong { font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--text); }
  .prog-track { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 99px; width: 0%; background: linear-gradient(90deg, #22c55e, #14b8a6); transition: width 0.5s cubic-bezier(.4,0,.2,1); }

  /* Level cards */
  .level-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; margin-bottom: 10px; overflow: hidden;
    transition: border-color 0.2s;
  }
  .level-card:hover { border-color: var(--border-hover); }

  .level-head {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 18px; cursor: pointer; user-select: none;
  }

  .lv-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    width: 36px; height: 36px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; border: 1px solid;
  }

  .lv-info { flex: 1; min-width: 0; }
  .lv-title { font-size: 14px; font-weight: 500; color: var(--text); }
  .lv-goal { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .lv-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .lv-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 500;
    padding: 3px 10px; border-radius: 99px; border: 1px solid;
    white-space: nowrap;
  }
  .lv-chevron { color: var(--muted); font-size: 12px; transition: transform 0.25s; }
  .lv-chevron.open { transform: rotate(180deg); }

  .lv-mini-track { height: 2px; background: var(--surface2); }
  .lv-mini-fill { height: 100%; transition: width 0.4s ease; width: 0%; }

  .level-body { display: none; padding: 18px; border-top: 1px solid var(--border); }
  .level-body.open { display: block; }

  .tasks-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 16px; }
  @media (max-width: 520px) { .tasks-grid { grid-template-columns: 1fr; } }

  .task-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 8px;
    border: 1px solid var(--border); cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .task-item:hover { background: var(--surface2); border-color: var(--border-hover); }
  .task-item.done { border-color: rgba(34,197,94,0.2); background: rgba(34,197,94,0.05); }

  .task-check {
    width: 17px; height: 17px; border-radius: 5px;
    border: 1px solid var(--subtle); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .task-item.done .task-check {
    background: var(--green); border-color: var(--green);
  }
  .task-check svg { display: none; }
  .task-item.done .task-check svg { display: block; }

  .task-label { font-size: 12.5px; color: var(--text); line-height: 1.35; }
  .task-item.done .task-label { color: var(--muted); text-decoration: line-through; text-decoration-color: rgba(100,116,139,0.5); }

  .notes-wrap { margin-top: 4px; }
  .notes-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .notes-wrap textarea {
    width: 100%; min-height: 68px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px;
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px;
    resize: vertical; outline: none; transition: border-color 0.2s;
  }
  .notes-wrap textarea::placeholder { color: var(--subtle); }
  .notes-wrap textarea:focus { border-color: var(--border-hover); }

  /* Done banner */
  .done-banner {
    display: none; text-align: center;
    padding: 20px; margin-bottom: 20px;
    background: rgba(34,197,94,0.07); border: 1px solid rgba(34,197,94,0.2);
    border-radius: 12px;
  }
  .done-banner p { font-size: 14px; font-weight: 500; color: #4ade80; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--subtle); border-radius: 99px; }
</style>
</head>
<body>
<div class="page-wrap">

  <header class="page-header">
    <div class="header-eyebrow"><span></span> Interactive tracker</div>
    <h1>AI Engineer Roadmap</h1>
    <p>From ML basics to production AI systems — track every step.</p>
  </header>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="s-done">0</div><div class="stat-lbl">Topics done</div></div>
    <div class="stat-card"><div class="stat-val" id="s-left">0</div><div class="stat-lbl">Remaining</div></div>
    <div class="stat-card"><div class="stat-val" id="s-lvl">0 / 8</div><div class="stat-lbl">Levels complete</div></div>
  </div>

  <div class="prog-wrap">
    <div class="prog-meta">
      <span>Overall progress</span>
      <strong id="pct-label">0%</strong>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  </div>

  <div class="done-banner" id="done-banner">
    <p>&#x1F680; You've completed the full AI Engineer Roadmap. Ship something great.</p>
  </div>

  <div id="levels-container"></div>

</div>

<script>
const LEVELS = [
  {
    title: "Level 1 — ML foundations", goal: "Understand model training fundamentals",
    color: "#22c55e", bg: "rgba(34,197,94,0.1)", border: "rgba(34,197,94,0.25)", fill: "#22c55e",
    tasks: ["Python for AI","NumPy","Pandas","Statistics","Probability","Linear algebra basics","Linear regression","Logistic regression","Decision trees","Random forest","XGBoost","House price predictor project"]
  },
  {
    title: "Level 2 — Deep learning", goal: "Understand how neural networks learn",
    color: "#14b8a6", bg: "rgba(20,184,166,0.1)", border: "rgba(20,184,166,0.25)", fill: "#14b8a6",
    tasks: ["Perceptron","Neural networks","Activation functions","Backpropagation","Loss functions","Optimizers","PyTorch","Digit recognition project","Image classification project"]
  },
  {
    title: "Level 3 — Transformers", goal: "Understand GPT internals",
    color: "#60a5fa", bg: "rgba(96,165,250,0.1)", border: "rgba(96,165,250,0.25)", fill: "#60a5fa",
    tasks: ["Tokenization","Embeddings","Attention","Self attention","Multi-head attention","Positional encoding","Transformer architecture","Read Attention Is All You Need","Mini transformer project","Mini GPT project"]
  },
  {
    title: "Level 4 — LLM engineer", goal: "Understand modern LLMs",
    color: "#a78bfa", bg: "rgba(167,139,250,0.1)", border: "rgba(167,139,250,0.25)", fill: "#a78bfa",
    tasks: ["Pretraining","Fine tuning","RLHF","Quantization","Context window","Hallucination","Inference","RAG vs fine tuning","Temperature","Prompt engineering"]
  },
  {
    title: "Level 5 — GenAI engineer", goal: "Build practical AI systems",
    color: "#fb923c", bg: "rgba(251,146,60,0.1)", border: "rgba(251,146,60,0.25)", fill: "#fb923c",
    tasks: ["Embeddings","Vector databases","Chunking","RAG","Hybrid search","Tool calling","Function calling","PDF chatbot","Knowledge assistant","Multi-document search"]
  },
  {
    title: "Level 6 — Agent engineer", goal: "Build autonomous AI agents",
    color: "#f472b6", bg: "rgba(244,114,182,0.1)", border: "rgba(244,114,182,0.25)", fill: "#f472b6",
    tasks: ["Agent architecture","Planning","Reflection","Memory","Multi-agent systems","MCP","Coding agent","Research agent","Interview agent"]
  },
  {
    title: "Level 7 — Production AI engineer", goal: "Deploy AI at scale",
    color: "#fbbf24", bg: "rgba(251,191,36,0.1)", border: "rgba(251,191,36,0.25)", fill: "#fbbf24",
    tasks: ["Model serving","vLLM","Caching","Rate limiting","Evaluation","Monitoring","Prompt versioning","Production chatbot","AI gateway"]
  },
  {
    title: "Level 8 — Research engineer", goal: "Advanced AI systems",
    color: "#94a3b8", bg: "rgba(148,163,184,0.1)", border: "rgba(148,163,184,0.25)", fill: "#94a3b8",
    tasks: ["LoRA","PEFT","CUDA basics","Distributed training","Mixture of experts","RLHF internals","Fine-tune LLM","Train small LLM"]
  }
];

const CHECK_SVG = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2.5" stroke="#0a0e1a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

const container = document.getElementById("levels-container");

LEVELS.forEach((lvl, li) => {
  const card = document.createElement("div");
  card.className = "level-card";

  let tasksHTML = "";
  lvl.tasks.forEach((task, ti) => {
    tasksHTML += `
      <div class="task-item" data-li="${li}" data-ti="${ti}">
        <div class="task-check">${CHECK_SVG}</div>
        <span class="task-label">${task}</span>
      </div>`;
  });

  card.innerHTML = `
    <div class="level-head" id="head-${li}">
      <div class="lv-num" style="background:${lvl.bg};border-color:${lvl.border};color:${lvl.color}">L${li+1}</div>
      <div class="lv-info">
        <div class="lv-title">${lvl.title}</div>
        <div class="lv-goal">${lvl.goal}</div>
      </div>
      <div class="lv-right">
        <span class="lv-badge" id="badge-${li}" style="background:${lvl.bg};border-color:${lvl.border};color:${lvl.color}">0 / ${lvl.tasks.length}</span>
        <svg class="lv-chevron" id="chev-${li}" width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="3,5 7,9 11,5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
    <div class="lv-mini-track"><div class="lv-mini-fill" id="mini-${li}" style="background:${lvl.fill}"></div></div>
    <div class="level-body" id="body-${li}">
      <div class="tasks-grid">${tasksHTML}</div>
      <div class="notes-wrap">
        <div class="notes-label">Notes</div>
        <textarea id="note-${li}" placeholder="Add your notes for this level…"></textarea>
      </div>
    </div>
  `;

  container.appendChild(card);

  card.querySelector(`#head-${li}`).addEventListener("click", () => {
    const body = document.getElementById(`body-${li}`);
    const chev = document.getElementById(`chev-${li}`);
    body.classList.toggle("open");
    chev.classList.toggle("open");
  });

  card.querySelectorAll(".task-item").forEach(item => {
    item.addEventListener("click", () => {
      const key = `ck_${item.dataset.li}_${item.dataset.ti}`;
      const done = item.classList.toggle("done");
      localStorage.setItem(key, done);
      updateAll();
    });
  });

  card.querySelector(`#note-${li}`).addEventListener("input", e => {
    localStorage.setItem(`note_${li}`, e.target.value);
  });
});

function loadData() {
  LEVELS.forEach((lvl, li) => {
    lvl.tasks.forEach((_, ti) => {
      if (localStorage.getItem(`ck_${li}_${ti}`) === "true") {
        const el = document.querySelector(`[data-li="${li}"][data-ti="${ti}"]`);
        if (el) el.classList.add("done");
      }
    });
    const ta = document.getElementById(`note-${li}`);
    if (ta) ta.value = localStorage.getItem(`note_${li}`) || "";
  });
  updateAll();
}

function updateAll() {
  let totalDone = 0, totalAll = 0, lvlsComplete = 0;

  LEVELS.forEach((lvl, li) => {
    let ldone = 0;
    lvl.tasks.forEach((_, ti) => {
      const el = document.querySelector(`[data-li="${li}"][data-ti="${ti}"]`);
      if (el && el.classList.contains("done")) ldone++;
    });
    const ltotal = lvl.tasks.length;
    totalDone += ldone; totalAll += ltotal;
    if (ldone === ltotal) lvlsComplete++;
    const pct = ltotal > 0 ? Math.round((ldone / ltotal) * 100) : 0;
    const badge = document.getElementById(`badge-${li}`);
    if (badge) badge.textContent = `${ldone} / ${ltotal}`;
    const mini = document.getElementById(`mini-${li}`);
    if (mini) mini.style.width = pct + "%";
  });

  const overall = totalAll > 0 ? Math.round((totalDone / totalAll) * 100) : 0;
  document.getElementById("pct-label").textContent = overall + "%";
  document.getElementById("prog-fill").style.width = overall + "%";
  document.getElementById("s-done").textContent = totalDone;
  document.getElementById("s-left").textContent = totalAll - totalDone;
  document.getElementById("s-lvl").textContent = `${lvlsComplete} / 8`;
  document.getElementById("done-banner").style.display = overall === 100 ? "block" : "none";
}

loadData();
</script>
</body>
</html>
